# Rime schema
# encoding: utf-8

schema:
  schema_id: rime_mint_flypy
  name: 薄荷拼音-小鹤混输
  version: "24.11.11"
  author:
    - mintimate < @Mintimate|https://www.mintimate.cn >
  description: |
    Mintimate的薄荷拼音（小鹤双拼混输）方案。
    除了参考官方明月拼音，还参考：
      * chenhe: https://chenhe.me
      * rime wiki: https://github.com/rime/home/wiki
      * rime ice: https://github.com/iDvel/rime-ice
      * Chewing - 新酷音
      * opencc - 開放中文轉換
  dependencies:
    - radical_pinyin # 参考 https://github.com/mirtlecn/rime-radical-pinyin
    - wubi98_mint # 98五笔库 https://github.com/yanhuacuo/98wubi-tables
    - stroke
    - melt_eng # 英文方案



switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 英文 ]
  - name: emoji_suggestion
    states: [ "😣️","😁️"]
    reset: 1
  - name: full_shape
    states: [ 半角, 全角 ]
    reset: 0
  - name: tone_display                  #开启后在输入编码的位置实时转换为带声调全拼，不开启则采用系统配置，影响的是preedit_format,归属：super_preedit.lua
    states: [ 声杳, 声起 ]
    reset: 0
  - name: transcription
    states: [ 简体 , 繁体 ]
    reset: 0
  - name: ascii_punct
    states: [ "。，" , "．，" ]
    reset: 0

engine:
  processors:
    - lua_processor@*select_character              # 以词定字
    - lua_processor@*codeLengthLimit_processor     # 使用Lua限制输入内容的最大长度(防止过长而卡顿)
    - ascii_composer                               # ※ 處理西文模式及中西文切換
    - recognizer                                   # ※ 與 matcher 搭配，處理符合特定規則的輸入碼，如網址、反查等
    - key_binder                                   # ※ 在特定條件下將按鍵綁定到其他按鍵，如重定義逗號、句號爲候選翻頁鍵
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor                                    # 標識西文段落
    - matcher                                            # 標識符合特定規則的段落，如網址、反查等
    - affix_segmentor@wubi98_mint
    - affix_segmentor@radical_reverse_lookup
    - affix_segmentor@stroke
    - affix_segmentor@unicode                         # Unicode 编码候选
    - abc_segmentor                                      # 標識常規的文字段落
    - punct_segmentor                                    # 標識句讀段落
    - fallback_segmentor                                 # 標識其他未標識段落
  translators:
    - punct_translator                                   # ※ 轉換標點符號
    - script_translator
    - script_translator@unicode                         # Unicode 编码候选
    - lua_translator@*shijian                            # 时间、日期、星期、月份、问候、节气、节日，N模式
    - lua_translator@*number_translator                  # 金额大小写
    - lua_translator@*chineseLunarCalendar_translator    # 农历
    - lua_translator@*mint_calculator_translator         # 计算器（lua 动态表达式）
    - table_translator@melt_eng                          # 英文输入（作为子翻译器，优先级需要比原生的低）
    - table_translator@cn_en                             # 中英混合词汇
    - reverse_lookup_translator@wubi98_mint
    - reverse_lookup_translator@radical_reverse_lookup
    - reverse_lookup_translator@stroke
    - lua_translator@*force_gc                           # 暴力GC，尝试解决小狼毫长期使用的卡顿
    # - reverse_lookup_translator # 反查模块，多标签情况下去除
    # - echo_translator      # ※ 没有候选词，返回字符
  filters:
    - lua_filter@*corrector_filter            # 错音错字提示
    - lua_filter@*super_preedit               # 为候选项添加声调
    - lua_filter@*autocap_filter              # 英文自动大写
    - simplifier@emoji_suggestion
    - simplifier@transcription_cc
    - lua_filter@*reduce_english_filter       # 降低部分英语单词在候选项的位置
    - lua_filter@*unicode_filter          # Unicode 编码候选
    - uniquifier                              # 去重

#shijian:仅仅作为提示使用，编码已经写死，引导键可以在key_binder下修改前缀
#时间：osj 或者 /sj
#日期：orq 或者 /rq
#农历：onl 或者 /nl
#星期：oxq 或者 /xq
#今年第几周：oww 或者 /ww
#节气：ojq 或者 /jq
#日期+时间：odt 或者 /dt
#时间戳：ott 或者 /tt
#大写N日期：N20250315 或者N0312不带年
#节日：ojr 或者 /jr
#问候模板：/day 或者 oday
# 通用日期时间格式化函数（供 /rq、/sj、/dt、N0101、N20150101 场景复用）
# 支持转义：
#   \X       —— 转义单个字符 X，按字面量输出（如 \Y \m \H 等）
#   [[...]]  —— 区块整体按字面量输出
#
# 约定占位符：
# 【日期】
#   Y  四位年份           0000-9999  例：2025
#   y  两位年份           00-99      例：25
#   m  月（前导零）        01-12      例：02
#   n  月（不带前导零）     1-12       例：2
#   d  日（前导零）        01-31      例：09
#   j  日（不带前导零）     1-31       例：9
#
# 【时间】
#   H  24小时（前导零）   00-23      例：08
#   G  24小时（不带零）   0-23       例：8
#   I  12小时（前导零）   01-12      例：08
#   l  12小时（不带零）   1-12       例：8   （注意是小写 L）
#   M  分钟（前导零）     00-59      例：05
#   S  秒（前导零）       00-59      例：09
#   p  am/pm（小写）     am / pm
#   P  AM/PM（大写）     AM / PM
# 【时区】
#   O  带冒号格式        +08:00、-04:30、+05:45
#   o  不带冒号格式      +0800、-0430、+0545
#   A  中文时段    凌晨 / 上午 / 中午 / 下午 / 晚上
date_formats:
  - "Y年m月d日"
  - "Y-m-d"
  - "Y/m/d"
  - "Y.m.d"
  - "Ymd"
  - "Y年n月j日"
  - "y年n月j日"
  - "n月j日"
time_formats:
  - "H:M"
  - "H点M分"
  - "H:M:S"
  - "H时M分S秒"
  - "AI:M"
  - "I:M P"
datetime_formats:
  - "Y-m-d H:M:S"
  - "Y-m-dTH:M:S O"
  - "YmdHMS"
  - "Y年m月d日 H点M分"
  - "y/m/d I:M p"

# 简繁切换
transcription_cc:
  option_name: transcription
  opencc_config: s2t.json             # s2t.json | s2hk.json | s2tw.json | s2twp.json
  tips: none                          # 转换提示: all 都显示 | char 仅单字显示 | none 不显示。
  excluded_types: [ reverse_lookup ]  # 不转换反查（两分拼字）的内容

# Emoji模块
emoji_suggestion:
  opencc_config: emoji.json
  option_name: emoji_suggestion
  tips: all
  inherit_comment: false

# 最大输入长度
codeLengthLimit_processor: 25


# Lua 配置: 降低部分英语单词在候选项的位置。
# 详细介绍 https://dvel.me/posts/make-rime-en-better/#短单词置顶的问题
# 正常情况： 输入 rug 得到 「1.rug 2.如果 …… 」
# 降低之后： 输入 rug 得到 「1.如果 2.rug …… 」
# 几种模式：
# all     使用 reduce_english_filter 自带的降频词库（降低所有 3~4 位长度、前 2~3 位是完整拼音、最后一位是声母的单词）
# none    不降低任何单词，相当于没有启用这个 Lua
# custom  自定义，只降低 words 里的
# 『留白』 不设置该选项，使用 reduce_english_filter 内全局设置内容
# （匹配的是编码，不是单词）
reduce_english_filter:
  mode: all  # all | none | custom | 『留白』
  idx: 2        # 降低到第 idx 个位置
  # 自定义的单词列表，示例列表没有降低部分常用单词，如 and cat mail Mac but bad shit ……
  words: [aid, ann,
  bail, bait, bam, band, bans, bat, bay, bend, bent, benz, bib, bid, bien, biz, boc, bop, bos, bud, buf,
  cab, cad, cain, cam, cans, cap, cas, cef, chad, chan, chap, chef, cher, chew, chic, chin, chip, chit, coup, cum, cunt, cur,
  dab, dag, dal, dam, dent, dew, dial, diet, dim, din, dip, dis, dit, doug, dub, dug, dunn,
  fab, fax, fob, fog, foul, fur,
  gag, gail, gain, gal, gam, gaol, ged, gel, ger, guam, gus, gut,
  hail, ham, hank, hans, hat, hay, heil, heir, hem, hep, hud, hum, hung, hunk, hut,
  jim, jug,
  kat,
  lab, lad, lag, laid, lam, laos, lap, lat, lax, lay, led, leg, lex, liam, lib, lid, lied, lien, lies, linn, lip, lit, liz, lob, lug, lund, lung, lux,
  mag, maid, mann, mar, mat, med, mel, mend, mens, ment, mil, mins, mint, mob, moc, mop, mos, mot, mud, mug, mum, nail,
  nap, nat, nay, neil, nib, nip, noun, nous, nun, nut,
  pac, paid, pail, pain, pair, pak, pal, pam, pans, pant, pap, par, pat, paw, pax, pens, pic, pier, pies, pins, pint, pit, pix, pod, pop, pos, pot, pour, pow, pub,
  rand, rant, rent, rep, res, ret, rex, rib, rid, rig, rim, rub, rug, rum, runc, runs,
  sac, sail, sal, sam, sans, sap, saw, sax, sew, sham, shaw, shin, sig, sin, sip, sis, suit, sung, suns, sup, sur, sus,
  tad, tail, taj, tar, tax, tec, ted, tel, ter, tex, tic, tied, tier, ties, tim, tin, tit, tour, tout, tum,
  wag, wand, womens, wap, wax, weir, won,
  yan, yen]

  
# 中国农历配置
chineseLunarCalendar_translator: lunar

translator:
  # enable_correction: true      # Rime自带的按键纠错，适用于手机26键 参考: https://github.com/rime/librime/pull/228
  # 字典文件
  dictionary: rime_mint          # 使用的字典文件
  prism: rime_mint_flypy     # 多方案共用一个词库时，为避免冲突，需要用 prism 指定一个名字。
  spelling_hints: 8              # corrector.lua ：为了让错音错字提示的 Lua 同时适配全拼双拼，将拼音显示在 comment 中
  always_show_comments: true     # corrector.lua ：Rime 默认在 preedit 等于 comment 时取消显示 comment，这里强制一直显示，供 corrector.lua 做判断用。
  comment_format: {comment}      # 将注释以词典字符串形式完全暴露，通过super_preedit.lua完全接管，灵活配置。
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/
  initial_quality: 1.2
  enable_user_dict: true         # 开启用户词典，根据用户输入调频（默认开启，此处再次声明）


unicode:
  tag: unicode
  dictionary: rime_mint
  prism: rime_mint_flypy
  enable_user_dict: false
  enable_sentence: false
  prefix: "Uc"
  tips: 〔Unicode〕
melt_eng:
  dictionary: melt_eng           # 英文词典
  enable_sentence: false         # 关闭自动造句
  enable_completion: false       # 关闭自动提示
  initial_quality: 0.8
  
# 中英混合词汇
cn_en:
  dictionary: ""                 # 中英混输，直接使用短语词典，普通字典直接留空即可
  user_dict: dicts/rime_ice.cn_en_flypy
  db_class: stabledb
  enable_completion: false
  enable_sentence: false
  initial_quality: 0.5
  comment_format:
    - xform/^.+$//

speller:
  # 如果不想让什么标点直接上屏，可以加在 alphabet，或者编辑标点符号为两个及以上的映射；默认没用大写字母，使用大写字母方便中英混熟词典生效
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA
  # 第一位 「空格」是拼音之间的默认分隔符；第二位「`」表示可以手动输入单引号来分割拼音
  delimiter: " `"
  # 拼写匹配
  algebra:
    - xlit/āáǎàōóǒòēéěèīíǐìūúǔùǖǘǚǜü/aaaaooooeeeeiiiiuuuuvvvvv/  # 万象词库 Start
    - xform/^ng$/eng/
    - xform/ńg|ňg|ǹg/eng/
    - xform/ń|ň|ǹ/en/                                            # 万象词库 End
    - erase/^xx$/ # 首选保留
    - derive/([aeiou])ng$/$1gn/        # dagn => dang
    - derive/([dtngkhrzcs])o(u|ng)$/$1o/  # zho => zhong|zhou
    - derive/ong$/on/                  # zhonguo => zhong guo
    - abbrev/^([a-z])[a-z]*$/$1/       # 简拼（首字母）
    - abbrev/^([zcs]h).+$/$1/ #简拼（zh, ch, sh）
     ### 自动纠错
    # 有些规则对全拼简拼混输有副作用：如「x'ai 喜爱」被纠错为「xia 下」
    # zh、ch、sh
    - derive/([zcs])h(a|e|i|u|ai|ei|an|en|ou|uo|ua|un|ui|uan|uai|uang|ang|eng|ong)$/h$1$2/  # hzi → zhi
    - derive/([zcs])h([aeiu])$/$1$2h/  # zih → zhi
    # ai
    - derive/^([wghk])ai$/$1ia/  # wia → wai
    # ia
    - derive/([qjx])ia$/$1ai/  # qai → qia
    # ei
    - derive/([wtfghkz])ei$/$1ie/
    # ie
    - derive/([jqx])ie$/$1ei/
    # ao
    - derive/([rtypsdghklzcbnm])ao$/$1oa/
    # ou
    - derive/([ypfm])ou$/$1uo/
    # uo（无）
    # an
    - derive/([wrtypsdfghklzcbnm])an$/$1na/
    # en
    - derive/([wrpsdfghklzcbnm])en$/$1ne/
    # ang
    - derive/([wrtypsdfghklzcbnm])ang$/$1nag/
    - derive/([wrtypsdfghklzcbnm])ang$/$1agn/
    # eng
    - derive/([wrtpsdfghklzcbnm])eng$/$1neg/
    - derive/([wrtpsdfghklzcbnm])eng$/$1egn/
    # ing
    - derive/([qtypdjlxbnm])ing$/$1nig/
    - derive/([qtypdjlxbnm])ing$/$1ign/
    # ong
    - derive/([rtysdghklzcn])ong$/$1nog/
    - derive/([rtysdghklzcn])ong$/$1ogn/
    # iao
    - derive/([qtpdjlxbnm])iao$/$1ioa/
    - derive/([qtpdjlxbnm])iao$/$1oia/
    # ui
    - derive/([rtsghkzc])ui$/$1iu/
    # iu
    - derive/([qjlxnm])iu$/$1ui/
    # ian
    - derive/([qtpdjlxbnm])ian$/$1ain/
    # - derive/([qtpdjlxbnm])ian$/$1ina/ # 和「李娜、蒂娜、缉拿」等常用词有冲突
    # in
    - derive/([qypjlxbnm])in$/$1ni/
    # iang
    - derive/([qjlxn])iang$/$1aing/
    - derive/([qjlxn])iang$/$1inag/
    # ua
    - derive/([g|k|h|zh|sh])ua$/$1au/
    # uai
    - derive/([g|h|k|zh|ch|sh])uai$/$1aui/
    - derive/([g|h|k|zh|ch|sh])uai$/$1uia/
    # uan
    - derive/([qrtysdghjklzxcn])uan$/$1aun/
    # - derive/([qrtysdghjklzxcn])uan$/$1una/ # 和「去哪、露娜」等常用词有冲突
    # un
    - derive/([qrtysdghjklzxc])un$/$1nu/
    # ue
    - derive/([nlyjqx])ue$/$1eu/
    # uang
    - derive/([g|h|k|zh|ch|sh])uang$/$1aung/
    - derive/([g|h|k|zh|ch|sh])uang$/$1uagn/
    - derive/([g|h|k|zh|ch|sh])uang$/$1unag/
    - derive/([g|h|k|zh|ch|sh])uang$/$1augn/
    # iong
    - derive/([jqx])iong$/$1inog/
    - derive/([jqx])iong$/$1oing/
    - derive/([jqx])iong$/$1iogn/
    - derive/([jqx])iong$/$1oign/
    # 其他
    - derive/([rtsdghkzc])o(u|ng)$/$1o/ # do → dou|dong
    - derive/ong$/on/ # lon → long
    - derive/([tl])eng$/$1en/ # ten → teng
    - derive/([qwrtypsdfghjklzxcbnm])([aeio])ng$/$1ng/ # lng → lang、leng、ling、long
    # 双拼适配
    #- derive/^([jqxy])u$/$1v/
    #- derive/^([aoe])([ioun])$/$1$1$2/
    #- derive/^([aoe])(ng)?$/$1$1$2/
    #- derive/iu$/Ⓠ/
    #- derive/(.)ei$/$1Ⓦ/
    #- derive/uan$/Ⓡ/
    #- derive/[uv]e$/Ⓣ/
    #- derive/un$/Ⓨ/
    #- derive/^sh/Ⓤ/
    #- derive/^ch/Ⓘ/
    #- derive/^zh/Ⓥ/
    #- derive/uo$/Ⓞ/
    #- derive/ie$/Ⓟ/
    #- derive/(.)i?ong$/$1Ⓢ/
    #- derive/ing$|uai$/Ⓚ/
    #- derive/(.)ai$/$1Ⓓ/
    #- derive/(.)en$/$1Ⓕ/
    #- derive/(.)eng$/$1Ⓖ/
    #- derive/[iu]ang$/Ⓛ/
    #- derive/(.)ang$/$1Ⓗ/
    #- derive/ian$/Ⓜ/
    #- derive/(.)an$/$1Ⓙ/
    #- derive/(.)ou$/$1Ⓩ/
    #- derive/[iu]a$/Ⓧ/
    #- derive/iao$/Ⓝ/
    #- derive/(.)ao$/$1Ⓒ/
    #- derive/ui$/Ⓥ/
    #- derive/in$/Ⓑ/
    #- xlit/ⓆⓌⓇⓉⓎⓊⒾⓄⓅⓈⒹⒻⒼⒽⒿⓀⓁⓏⓍⒸⓋⒷⓃⓂ/qwrtyuiopsdfghjklzxcvbnm/

    # 张居正方案（替换原方案小鹤双拼适配）
    
      # 需要特殊处理避免歧义的韵母
    - derive/^([bcdfghklmnprstwyz])(ang)$/$1h
    - derive/^(ch)(ang)$/ih
    - derive/^(sh)(ang)$/uh
    - derive/^(zh)(ang)$/vh

    - derive/^([cdghklnrstyz])(ong)$/$1s
    - derive/^(ch)(ong)$/is
    - derive/^(zh)(ong)$/vs

    - derive/^([bcdghklmnpstwz])(ai)$/$1d
    - derive/^(ch)(ai)$/id
    - derive/^(sh)(ai)$/ud
    - derive/^(zh)(ai)$/vd

    - derive/^([bcdghklmnprstyz])(ao)$/$1c
    - derive/^(ch)(ao)$/ic
    - derive/^(sh)(ao)$/uc
    - derive/^(zh)(ao)$/vc

    - derive/^([bcdfghklmnprstwyz])(an)$/$1j
    - derive/^(ch)(an)$/ij
    - derive/^(sh)(an)$/uj
    - derive/^(zh)(an)$/vj

      # 单字母韵母
    - derive/^(a)$/aa
    - derive/^(o)$/oo
    - derive/^(e)$/ee

      # 三字母韵母
    - derive/^(ang)$/ah
    - derive/^(eng)$/eg

      # 卷舌声母
    - derive/^(zh)([aeiu])$/v$2
    - derive/^(ch)([aeiu])$/i$2
    - derive/^(sh)([aeiu])$/u$2

      # 四字母韵母
    - derive/^([jlnqx])(iang)$/$1l
    - derive/^([jqx])(iong)$/$1s

      # 三字母韵母
    - derive/^([bdjlmnpqtxy])(ing)$/$1k
    - derive/^([bdjlmnpqtx])(iao)$/$1n
    - derive/^([bdjlmnpqtx])(ian)$/$1m

      # 二字母韵母
    - derive/^([djlmnqx])(iu)$/$1q
    - derive/^([jlnqxy])[uv]e/$1t
    - derive/^([bdjlmnpqtx])(ie)$/$1p
    - derive/^([djlqx])(ia)$/$1x
    - derive/^([bjlmnpqxy])(in)$/$1b

      # iuv特殊处理
      # 四字母
    - derive/^([ghk])(uang)$/$1l
    - derive/^(ch)(uang)$/il
    - derive/^(sh)(uang)$/ul
    - derive/^(zh)(uang)$/vl

      # 三字母
    - derive/^([cdghjklnqrstxyz])(uan)$/$1r
    - derive/^(ch)(uan)$/ir
    - derive/^(sh)(uan)$/ur
    - derive/^(zh)(uan)$/vr

    - derive/^([bcdfghklmnprstwz])(eng)$/$1g
    - derive/^(ch)(eng)$/ig
    - derive/^(sh)(eng)$/ug
    - derive/^(zh)(eng)$/vg

    - derive/^([ghk])(uai)$/$1k
    - derive/^(ch)(uai)$/ik
    - derive/^(sh)(uai)$/uk
    - derive/^(zh)(uai)$/vk

      # 二字母
    - derive/^([bdfghklmnpwz])(ei)$/$1w
    - derive/^(sh)(ei)$/uw
    - derive/^(zh)(ei)$/vw

    - derive/^([cdghjklqrstxyz])(un)$/$1y
    - derive/^(ch)(un)$/iy
    - derive/^(sh)(un)$/uy
    - derive/^(zh)(un)$/vy

    - derive/^([cdghklnrstz])(uo)$/$1o
    - derive/^(ch)(uo)$/io
    - derive/^(sh)(uo)$/uo
    - derive/^(zh)(uo)$/vo

    - derive/^([bcdfghkmnprswz])(en)$/$1f
    - derive/^(ch)(en)$/if
    - derive/^(sh)(en)$/uf
    - derive/^(zh)(en)$/vf

    - derive/^([cdfghklmnprstyz])(ou)$/$1z
    - derive/^(ch)(ou)$/iz
    - derive/^(sh)(ou)$/uz
    - derive/^(zh)(ou)$/vz

    - derive/^([ghkr])(ua)$/$1x
    - derive/^(ch)(ua)$/ix
    - derive/^(sh)(ua)$/ux
    - derive/^(zh)(ua)$/vx

    - derive/^([cdghkrstz])(ui)$/$1v
    - derive/^(ch)(ui)$/iv
    - derive/^(sh)(ui)$/uv
    - derive/^(zh)(ui)$/vv

wubi98_mint:
  tag: wubi98_mint
  dictionary: wubi98_mint
  enable_user_dict: false
  enable_completion: true
  prefix: "Uw"
  suffix: " '"
  tips: 〔五笔〕

stroke:
  tag: stroke
  dictionary: stroke
  enable_user_dict: false
  prefix: 'Ui'
  suffix: " '"
  tips: 〔笔画〕
  preedit_format:
    - xlit/hspnz/一丨丿丶乙/

radical_reverse_lookup:
  tag: radical_lookup
  dictionary: radical_pinyin
  enable_completion: false
  enable_sentence: false
  prefix: "Uu"
  suffix: " '"
  comment_format:
    - xform/([nljqxy])v/$1ü/
  tips: 〔拆字〕

reverse_lookup:
  tags: [wubi98_mint,stroke,radical_lookup]
  overwrite_comment: true
  dictionary: rime_mint

punctuator:
  import_preset: symbols
  # 定义部分半角字符
  half_shape:
      "#": "#"
      "*": "*"
      '.' : { commit: 。 }
      "`": "`"
      "~": "~"
      "@": "@"
      "=": "="
      "/": ["/", "÷",]
      '\': "、"
      "_" : "──"
      "'": {pair: ["「", "」"]}
      "[": ["【", "["]
      "]": ["】", "]"]
      "$": ["¥", "$", "€", "£", "¢", "¤"]
      "<": ["《", "〈", "«", "<"]
      ">": ["》", "〉", "»", ">"]

recognizer:
  import_preset: default
  patterns:
    unicode: "^Uc[a-z0-9;]*'?$"
    url: "^[a-z]+[.].+$"
    punct: "^/([0-9]0?|[a-zA-Z]+)$"
    wubi98_mint: "Uw[a-z]*'?$"
    stroke: "Ui[a-z]*'?$"
    radical_lookup: "Uu[a-z]*'?$"
    rmb: "^R[0-9]+[.]?[0-9]*"        # 响应 lua_translator@number_translator 脚本将自动获取第 2 个字符作为触发前缀
    expression: "^=.*$"              # 响应 lua_translator@expression_translator 脚本将自动获取第 2 个字符作为触发前缀
    gregorian_to_lunar: "^N[0-9]{1,8}"  # 响应 lua_translator@Chinese_lunar_calendar 公历转农历，输入 N20240115 得到「二〇二四年腊月初五」，脚本将自动获取第 2 个字符作为触发前缀
    uppercase: ""  # 覆写默认的 uppercase 使其可以在输入大写后，输入数字


key_binder:
  import_preset: default
  # Lua 配置: shijian.lua 的引导符，涉及：日期、时间、节日、节气、生日、问候模板等功能
  shijian_keys: ["o"]
  bindings:
    - {accept: "Control+Shift+E", toggle: emoji_suggestion, when: always}   # Emoji 快捷键
    - {accept: "Control+Shift+1", toggle: transcription, when: has_menu}           # 当存在候选菜单时，可以切换简体和繁体
    - {accept: "Control+Shift+exclam", toggle: transcription, when: has_menu}      # 当存在候选菜单时，可以切换简体和繁体（小狼毫可能读取这个）


menu:
  # 候选词个数
  page_size: 6


